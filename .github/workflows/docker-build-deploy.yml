name: Docker Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: wangyucode
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from package.json
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NEXT_PUBLIC_BASE_PATH=/dashboard
          push: true
          tags: |
            wangyucode/ai-generated-dashboard:latest
            wangyucode/ai-generated-dashboard:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "wycode.cn"
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /root/docker/
            docker pull wangyucode/ai-generated-dashboard:latest
            DASHBOARD_VERSION=${{ env.VERSION }} docker compose up -d --force-recreate --pull always dashboard
            sleep 10
            docker compose ps
            docker image prune -f
