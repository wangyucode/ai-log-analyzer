version: '3.8'

services:
  app:
    build: .
    container_name: access-log-analyzer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - LOG_RETENTION_DAYS=30
      - DATABASE_URL=file:/app/data/sqlite.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - log-net

networks:
  log-net:
    driver: bridge
